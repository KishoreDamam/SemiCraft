name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ruff:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run ruff
        run: uv run ruff check .

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run pytest
        run: uv run pytest

  lint-gate:
    name: golden lint gate (verilator)
    runs-on: ubuntu-latest
    # WP-04 lands the lint wrapper + its own test suite (backend/tests/lint),
    # which is a hard gate below (no continue-on-error). The golden-file lint
    # regression (WP-08) is landing in parallel and may not have tests yet,
    # so that step alone keeps continue-on-error until WP-08 confirms green.
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run lint module tests (incl. verilator integration test)
        run: uv run pytest backend/tests/lint -m ""
      - name: Run golden lint gate
        continue-on-error: true
        run: |
          if [ -d backend/tests/golden ] && find backend/tests/golden -name 'test_*.py' | grep -q .; then
            uv run pytest backend/tests/golden -k lint
          else
            echo "No golden lint tests yet (WP-08 pending) — skipping."
          fi
