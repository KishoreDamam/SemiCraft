name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ruff:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run ruff
        run: uv run ruff check .

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run pytest
        run: uv run pytest

  lint-gate:
    name: golden lint + tb-compile gate (verilator)
    runs-on: ubuntu-latest
    # WP-04 lands the lint wrapper + its own test suite (backend/tests/lint),
    # which is a hard gate below (no continue-on-error). The golden-file lint
    # regression (WP-08) has been green since it landed, so that step is now
    # a hard gate too (P2-14 removed its continue-on-error).
    #
    # P2-14 adds the tb-compile step: every committed golden TB (P2-13's
    # smoke-TB generator, `*_tb.sv` under backend/tests/golden/**) is compiled
    # (not run) with `verilator --timing --binary`. Runs in the same job,
    # after the lint gate, to reuse the one Verilator install and keep total
    # CI time down. Until P2-13 lands and doc/tb goldens are regenerated +
    # committed, test_tb_compile.py collects zero cases and is a no-op — the
    # step still passes.
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run lint module tests (incl. verilator integration test)
        run: uv run pytest backend/tests/lint -m ""
      - name: Run golden lint gate
        run: |
          if [ -d backend/tests/golden ] && find backend/tests/golden -name 'test_*.py' | grep -q .; then
            uv run pytest backend/tests/golden -k lint
          else
            echo "No golden lint tests yet (WP-08 pending) — skipping."
          fi
      - name: Run golden TB compile gate (P2-14)
        run: uv run pytest backend/tests/golden/test_tb_compile.py -v
      - name: Run golden TB run gate (P3-03a, enforcing)
        # Executes each module's defaults smoke TB (SEMICRAFT_TB_RUN_ALL=1
        # for the full matrix). Went enforcing after the first advisory run
        # passed 14/14 (the one check-value bug it found — clock-divider
        # toggle sampling — was fixed at 71a4c01).
        run: uv run pytest backend/tests/golden/test_tb_run.py -v
